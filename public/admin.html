<!DOCTYPE html>
<html lang="mr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Newspaper</title>

<link rel="stylesheet" href="style.css">

</head>


<body>
   <div class="header">
    <h2>📰 Newspaper Admin Panel</h2>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>
</div>
<script>

if(localStorage.getItem("admin")!="true"){

    window.location="login.html";

}


function logout(){
    localStorage.removeItem("admin");
    window.location="login.html";
}

</script>



<div class="container">

<h1>📰 Newspaper Admin Panel</h1>

<button onclick="logout()">
Logout
</button>


<div class="dashboard">
    <div class="box">
        <h3>Total PDFs</h3>
        <h2 id="totalPDF">0</h2>
    </div>

    <div class="box">
        <h3>Total Newspapers</h3>
        <h2 id="totalNews">0</h2>
    </div>

    <div class="box">
        <h3>Lokbharti</h3>
        <h2 id="lokCount">0</h2>
    </div>

    <div class="box">
        <h3>Swabhimani Lok</h3>
        <h2 id="swaCount">0</h2>
    </div>

    <div class="box">
        <h3>Loksanskruti</h3>
        <h2 id="sanCount">0</h2>
    </div>

</div>
</div>


<input 
type="text"
id="search"
placeholder="Search Newspaper..."
onkeyup="searchNews()">

<h2>PDF Upload</h2>

<div class="upload-card">
<form id="uploadForm">
<form id="uploadForm" class="upload-form">
<h2>📤 Upload Newspaper PDF</h2>

<div class="form-grid">

    <div class="form-group">
        <label>वर्तमानपत्र निवडा</label>
        <select name="newspaper" required>
            <option value="">Select Newspaper</option>
            <option>Lokbharti</option>
            <option>Swabhimani Lok</option>
            <option>Loksanskruti</option>
        </select>
    </div>

    <div class="form-group">
        <label>प्रकार निवडा</label>
        <select name="category" required>
            <option value="">Select Category</option>
            <option>Daily</option>
            <option>Weekly</option>
            <option>Monthly</option>
        </select>
    </div>

    <div class="form-group">
        <label>RNI Number</label>
        <input type="text" name="rni" placeholder="Enter RNI Number" required>
    </div>

    <div class="form-group">
        <label>Owner Name</label>
        <input type="text" name="owner" placeholder="Enter Owner Name" required>
    </div>

    <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" name="mobile" placeholder="Enter Mobile Number" required>
    </div>

    <div class="form-group">
        <label>Email ID</label>
        <input type="email" name="email" placeholder="Enter Email Address" required>
    </div>

    <div class="form-group">
        <label>Editor Name</label>
        <input type="text" name="editor" placeholder="Enter Editor Name" required>
    </div>

    <div class="form-group">
        <label>Publisher Name</label>
        <input type="text" name="publisher" placeholder="Enter Publisher Name" required>
    </div>

    <div class="form-group">
        <label>Volume Number</label>
        <input type="text" name="volume" placeholder="Enter Volume Number" required>
    </div>

    <div class="form-group">
        <label>Issue Number</label>
        <input type="text" name="issue" placeholder="Enter Issue Number" required>
    </div>

</div>

<div class="file-box">
    <label>📄 PDF निवडा</label>
    <input type="file" name="pdf" accept=".pdf" required>
</div>

<button type="submit" class="upload-btn">
    📤 Upload PDF
</button>
</form>
</div>

<p id="message"></p>

<h2>📊 Latest Uploads</h2>

<div id="latestUploads"></div>



<hr>

<h2>Uploaded Newspapers</h2>

<div id="newsList"></div>
</div>


<div id="newsList"></div>

<script>

function logout(){

localStorage.removeItem("admin");

window.location="login.html";

}  


document
.getElementById("uploadForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    let formData = new FormData(this);

    let response = await fetch("/upload", {
        method:"POST",
        body:formData
    });

    let result = await response.json();

    document.getElementById("message").innerHTML =
    "✅ " + result.message;

    this.reset();

    loadNews();

});




// Uploaded Newspaper List

async function loadNews(){

    let response = await fetch("/newspapers");

    let data = await response.json();

    console.log("DATA FROM SERVER:");
console.log(data);
document.getElementById("totalPDF").innerHTML = data.length;


let names = new Set(
data.map(item => item.newspaper)
);


document.getElementById("totalNews").innerHTML =
names.size;

document.getElementById("lokCount").innerHTML =
data.filter(
n => n.newspaper === "Lokbharti"
).length;

document.getElementById("swaCount").innerHTML =
data.filter(
n => n.newspaper === "Swabhimani Lok"
).length;

document.getElementById("sanCount").innerHTML =
data.filter(
n => n.newspaper === "Loksanskruti"
).length;

    let box = document.getElementById("newsList");

    box.innerHTML = "";
    

    let latest = data.slice(0,5);

document.getElementById("latestUploads").innerHTML =
latest.map(item => `
<div class="card">
📰 ${item.newspaper}
<br>
📅 ${new Date(item.date).toLocaleDateString()}
</div>
`).join("");

    data.forEach(news => {


        box.innerHTML += `

        <div class="card">

            <h3>${news.newspaper}</h3>

            <p>
            Category : ${news.category}
            </p>

            <p>
            PDF : ${news.pdf}
            </p>


            <a href="/uploads/${news.pdf}" target="_blank">
            View PDF
            </a>


            <br><br>


            <button onclick="deleteNews('${news.id}')">
            Delete
            </button>


        </div>

        `;


    });


}



// Delete Function

async function deleteNews(id){


    let confirmDelete =
    confirm("Delete this Newspaper?");


    if(confirmDelete){


        await fetch("/delete/"+id,{
            method:"DELETE"
        });


        alert("Deleted Successfully");


        loadNews();

    }


}



loadNews();


</script>

</body>

</html>
